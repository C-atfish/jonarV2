server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Serve static files; allow extensionless paths (e.g. /about -> about.html)
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Reverse-proxy API calls to the backend container.
    # The trailing slash strips the /api prefix:
    #   /api/download-cv  ->  http://backend:1001/download-cv
    location /api/ {
        proxy_pass http://backend:1001/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets aggressively
    location ~* \.(?:css|js|png|jpe?g|gif|svg|ico|woff2?|ttf|pdf)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
